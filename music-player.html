<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse — Music Player</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg1: #0a0a12;
      --bg2: #0f0f1a;
      --glass: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-hover: rgba(255, 255, 255, 0.07);
      --accent: #a78bfa;
      --accent2: #60a5fa;
      --accent3: #f472b6;
      --text: #f1f0f5;
      --muted: rgba(255, 255, 255, 0.38);
      --muted2: rgba(255, 255, 255, 0.18);
      --radius-card: 28px;
      --radius-btn: 50%;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg1);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated gradient orbs in background */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
      animation: orbFloat 12s ease-in-out infinite alternate;
    }

    body::before {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(167, 139, 250, 0.18) 0%, transparent 70%);
      top: -150px;
      left: -100px;
    }

    body::after {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(96, 165, 250, 0.14) 0%, transparent 70%);
      bottom: -100px;
      right: -80px;
      animation-delay: -6s;
    }

    @keyframes orbFloat {
      0% {
        transform: translate(0, 0) scale(1);
      }

      100% {
        transform: translate(40px, 30px) scale(1.1);
      }
    }

    /* ── App wrapper ──────────────────────────────── */
    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 920px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }

    @media (max-width: 720px) {
      .app {
        grid-template-columns: 1fr;
        max-width: 420px;
      }
    }

    /* ── Shared card style ───────────────────────── */
    .card {
      background: rgba(15, 15, 26, 0.7);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-card);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      overflow: hidden;
      box-shadow:
        0 32px 80px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 1px 0 rgba(255, 255, 255, 0.08) inset;
    }

    /* ── Player Card ─────────────────────────────── */
    .player-card {
      position: relative;
    }

    /* Dynamic backdrop art blur */
    .art-backdrop {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #1a0a3c, #0a0a12);
      transition: background 1s ease;
      z-index: 0;
    }

    .art-backdrop::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom,
          rgba(10, 10, 18, 0.2) 0%,
          rgba(10, 10, 18, 0.85) 65%,
          rgba(10, 10, 18, 1) 100%);
    }

    .player-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      padding: 32px 28px 28px;
      gap: 0;
    }

    /* Album art */
    .album-art-wrap {
      position: relative;
      width: 180px;
      height: 180px;
      margin: 0 auto 24px;
    }

    .album-glow {
      position: absolute;
      inset: -16px;
      border-radius: 50%;
      background: var(--accent);
      filter: blur(40px);
      opacity: 0.25;
      transition: opacity var(--transition), background var(--transition);
      animation: pulse-glow 3s ease-in-out infinite;
    }

    @keyframes pulse-glow {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.25;
      }

      50% {
        transform: scale(1.08);
        opacity: 0.38;
      }
    }

    .album-disc {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      position: relative;
      animation: spin 8s linear infinite paused;
      transition: all var(--transition);
    }

    .album-disc.playing {
      animation-play-state: running;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .disc-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(#1c1c2e 0%, #2a2a42 8%, #1c1c2e 12%, #2a2a42 22%,
          #1c1c2e 26%, #2a2a42 36%, #1c1c2e 40%, #2a2a42 50%,
          #1c1c2e 54%, #2a2a42 64%, #1c1c2e 68%, #2a2a42 78%,
          #1c1c2e 82%, #2a2a42 92%, #1c1c2e 96%, #2a2a42 100%);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06) inset;
    }

    .disc-art {
      position: absolute;
      inset: 22%;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
    }

    .disc-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 50%;
      transition: opacity 0.5s ease;
    }

    .disc-hole {
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #0a0a12;
      border: 2px solid rgba(255, 255, 255, 0.15);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
    }

    /* Track info */
    .track-info {
      text-align: center;
      margin-bottom: 24px;
    }

    .track-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 5px;
    }

    .track-artist {
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .track-badge {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
      background: rgba(167, 139, 250, 0.15);
      color: var(--accent);
      border: 1px solid rgba(167, 139, 250, 0.3);
    }

    /* Progress bar */
    .progress-section {
      margin-bottom: 22px;
    }

    .progress-track {
      height: 4px;
      background: var(--muted2);
      border-radius: 99px;
      cursor: pointer;
      position: relative;
      margin-bottom: 8px;
      overflow: visible;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 99px;
      width: 0%;
      transition: width 0.15s linear;
      position: relative;
    }

    .progress-thumb {
      position: absolute;
      right: -7px;
      top: 50%;
      transform: translateY(-50%) scale(0);
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.4);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .progress-track:hover .progress-thumb {
      transform: translateY(-50%) scale(1);
    }

    .times {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      font-variant-numeric: tabular-nums;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* Main controls */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 22px;
    }

    .ctrl {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .ctrl:hover {
      color: var(--text);
      background: var(--glass);
    }

    .ctrl.active {
      color: var(--accent);
    }

    .ctrl svg {
      display: block;
    }

    .ctrl-play {
      width: 62px;
      height: 62px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 8px 30px rgba(167, 139, 250, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.1) inset;
      flex-shrink: 0;
    }

    .ctrl-play:hover {
      transform: scale(1.1);
      box-shadow: 0 12px 40px rgba(167, 139, 250, 0.55);
    }

    .ctrl-play:active {
      transform: scale(0.95);
    }

    .ctrl-play svg {
      display: block;
    }

    /* Volume row */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .vol-icon {
      color: var(--muted);
      flex-shrink: 0;
      transition: color 0.2s;
    }

    .vol-icon:hover {
      color: var(--text);
    }

    input[type=range].slider {
      -webkit-appearance: none;
      flex: 1;
      height: 3px;
      border-radius: 99px;
      background: var(--muted2);
      outline: none;
      cursor: pointer;
      transition: background 0.2s;
    }

    input[type=range].slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.4);
      transition: transform 0.2s;
    }

    input[type=range].slider:hover::-webkit-slider-thumb {
      transform: scale(1.2);
    }

    .vol-pct {
      font-size: 0.68rem;
      color: var(--muted);
      width: 30px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    /* Extras row */
    .extras-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 16px;
      border-top: 1px solid var(--glass-border);
    }

    .toggle-group {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .toggle-pill {
      width: 38px;
      height: 22px;
      background: var(--muted2);
      border-radius: 11px;
      position: relative;
      transition: background 0.25s;
    }

    .toggle-pill.on {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .toggle-pill::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      top: 3px;
      left: 3px;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    .toggle-pill.on::after {
      transform: translateX(16px);
    }

    .toggle-label {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      user-select: none;
      transition: color 0.2s;
    }

    .toggle-group:hover .toggle-label {
      color: var(--text);
    }

    /* ── Waveform Visualizer ─────────────────────── */
    .visualizer-wrap {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 3px;
      height: 36px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .wave-bar {
      width: 3px;
      border-radius: 99px;
      background: linear-gradient(to top, var(--accent2), var(--accent));
      opacity: 0.7;
      animation: wave-dance 1s ease-in-out infinite alternate;
    }

    .visualizer-wrap.paused .wave-bar {
      animation-play-state: paused;
    }

    @keyframes wave-dance {
      0% {
        height: 4px;
        opacity: 0.4;
      }

      100% {
        height: var(--h, 24px);
        opacity: 0.85;
      }
    }

    /* ── Playlist Card ───────────────────────────── */
    .playlist-card {
      display: flex;
      flex-direction: column;
    }

    .playlist-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 24px 16px;
      border-bottom: 1px solid var(--glass-border);
    }

    .playlist-title-text {
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .playlist-count {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      padding: 3px 10px;
      border-radius: 100px;
    }

    /* Search bar */
    .search-wrap {
      padding: 12px 20px;
      border-bottom: 1px solid var(--glass-border);
    }

    .search-input {
      width: 100%;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 9px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .search-input::placeholder {
      color: var(--muted);
    }

    .search-input:focus {
      border-color: rgba(167, 139, 250, 0.4);
      background: var(--glass-hover);
    }

    /* Playlist list */
    .playlist-list {
      list-style: none;
      overflow-y: auto;
      max-height: 380px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
    }

    .playlist-list::-webkit-scrollbar {
      width: 4px;
    }

    .playlist-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .playlist-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 99px;
    }

    .pl-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      cursor: pointer;
      transition: background var(--transition);
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      position: relative;
    }

    .pl-item:last-child {
      border-bottom: none;
    }

    .pl-item:hover {
      background: var(--glass-hover);
    }

    .pl-item.active {
      background: linear-gradient(90deg, rgba(167, 139, 250, 0.1), rgba(96, 165, 250, 0.06));
    }

    .pl-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, var(--accent), var(--accent2));
      border-radius: 0 2px 2px 0;
    }

    .pl-num {
      font-size: 0.72rem;
      color: var(--muted);
      width: 20px;
      text-align: center;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
      transition: color 0.2s;
    }

    .pl-item.active .pl-num {
      display: none;
    }

    /* Animated bars for active */
    .pl-bars {
      display: none;
      width: 20px;
      align-items: flex-end;
      justify-content: center;
      gap: 2px;
      height: 16px;
      flex-shrink: 0;
    }

    .pl-item.active .pl-bars {
      display: flex;
    }

    .pl-bar {
      width: 3px;
      border-radius: 2px;
      background: linear-gradient(to top, var(--accent2), var(--accent));
      animation: pl-bounce 0.7s ease-in-out infinite alternate;
    }

    .pl-bar:nth-child(2) {
      animation-delay: 0.15s;
    }

    .pl-bar:nth-child(3) {
      animation-delay: 0.3s;
    }

    .pl-bars.paused .pl-bar {
      animation-play-state: paused;
    }

    @keyframes pl-bounce {
      from {
        height: 3px;
      }

      to {
        height: 14px;
      }
    }

    .pl-art {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      transition: transform 0.2s;
    }

    .pl-item:hover .pl-art {
      transform: scale(1.04);
    }

    .pl-info {
      flex: 1;
      overflow: hidden;
    }

    .pl-title {
      font-size: 0.85rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
      margin-bottom: 3px;
      transition: color 0.2s;
    }

    .pl-item.active .pl-title {
      color: var(--accent);
    }

    .pl-artist {
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pl-dur {
      font-size: 0.7rem;
      color: var(--muted);
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    /* Genre tags on playlist items */
    .pl-genre {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 6px;
      background: rgba(167, 139, 250, 0.12);
      color: var(--accent);
      border: 1px solid rgba(167, 139, 250, 0.2);
      flex-shrink: 0;
      display: none;
    }

    @media (min-width: 600px) {
      .pl-genre {
        display: block;
      }
    }

    /* ── Animations ──────────────────────────────── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .player-card {
      animation: fadeUp 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .playlist-card {
      animation: fadeUp 0.7s 0.15s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
  </style>
</head>

<body>

  <div class="app">

    <!-- ── PLAYER CARD ── -->
    <div class="card player-card">
      <div class="art-backdrop" id="artBg"></div>
      <div class="player-inner">

        <!-- Album Disc -->
        <div class="album-art-wrap">
          <div class="album-glow" id="albumGlow"></div>
          <div class="album-disc" id="albumDisc">
            <div class="disc-ring"></div>
            <div class="disc-art">
              <img id="albumImg" src="" alt="Album Art">
            </div>
            <div class="disc-hole"></div>
          </div>
        </div>

        <!-- Track info -->
        <div class="track-info">
          <div class="track-title" id="trackTitle">Select a track</div>
          <div class="track-artist" id="trackArtist">— —</div>
          <span class="track-badge" id="trackGenre">Electronic</span>
        </div>

        <!-- Waveform Visualizer -->
        <div class="visualizer-wrap paused" id="visualizer"></div>

        <!-- Progress -->
        <div class="progress-section">
          <div class="progress-track" id="progressTrack">
            <div class="progress-fill" id="progressFill">
              <div class="progress-thumb"></div>
            </div>
          </div>
          <div class="times">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
          </div>
        </div>

        <!-- Controls -->
        <div class="controls">
          <!-- Shuffle -->
          <button class="ctrl" id="btnShuffle" title="Shuffle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M16 3h5v5M4 20l16-16M16 20h5v-5M4 4l7 7" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>

          <!-- Prev -->
          <button class="ctrl" id="btnPrev" title="Previous">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 6h2v12H6V6zm3.5 6 8.5 6V6l-8.5 6z" />
            </svg>
          </button>

          <!-- Play/Pause -->
          <button class="ctrl-play" id="btnPlay" title="Play / Pause">
            <svg id="iconPlay" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z" />
            </svg>
            <svg id="iconPause" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
            </svg>
          </button>

          <!-- Next -->
          <button class="ctrl" id="btnNext" title="Next">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 18l8.5-6L6 6v12zm10-12v12h2V6h-2z" />
            </svg>
          </button>

          <!-- Repeat -->
          <button class="ctrl" id="btnRepeat" title="Repeat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M17 1l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>

        <!-- Volume -->
        <div class="volume-row">
          <svg class="vol-icon" id="volIcon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
          </svg>
          <input type="range" class="slider" id="volSlider" min="0" max="100" value="80">
          <span class="vol-pct" id="volPct">80%</span>
        </div>

        <!-- Autoplay & Shuffle toggles -->
        <div class="extras-row">
          <div class="toggle-group" id="autoplayWrap">
            <div class="toggle-pill on" id="autoplayToggle"></div>
            <span class="toggle-label">Autoplay</span>
          </div>
          <div class="toggle-group" id="shuffleWrap2">
            <div class="toggle-pill" id="shuffleToggle2"></div>
            <span class="toggle-label">Shuffle</span>
          </div>
        </div>

      </div>
    </div>

    <!-- ── PLAYLIST CARD ── -->
    <div class="card playlist-card">
      <div class="playlist-header">
        <span class="playlist-title-text">Queue</span>
        <span class="playlist-count" id="plCount"></span>
      </div>

      <div class="search-wrap">
        <input type="text" class="search-input" id="searchInput" placeholder="Search tracks…">
      </div>

      <ul class="playlist-list" id="playlistList"></ul>
    </div>

  </div>

  <audio id="audioEl"></audio>

  <script>
    // ── Tracks ──────────────────────────────────────────────
    const tracks = [
      {
        title: 'Electronic Sunrise',
        artist: 'SoundHelix',
        genre: 'Electronic',
        art: 'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=300&q=80',
        color: ['#7c3aed', '#2563eb'],
        src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3',
        duration: '3:42'
      },
      {
        title: 'Acoustic Dreams',
        artist: 'SoundHelix',
        genre: 'Acoustic',
        art: 'https://images.unsplash.com/photo-1511379938547-c1f69419868d?w=300&q=80',
        color: ['#059669', '#0284c7'],
        src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3',
        duration: '4:15'
      },
      {
        title: 'Night Drive',
        artist: 'SoundHelix',
        genre: 'Ambient',
        art: 'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=300&q=80',
        color: ['#d97706', '#dc2626'],
        src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3',
        duration: '3:58'
      },
      {
        title: 'City Pulse',
        artist: 'SoundHelix',
        genre: 'Synthwave',
        art: 'https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?w=300&q=80',
        color: ['#db2777', '#7c3aed'],
        src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3',
        duration: '4:31'
      },
      {
        title: 'Orbital Drift',
        artist: 'SoundHelix',
        genre: 'Space',
        art: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=300&q=80',
        color: ['#0284c7', '#4f46e5'],
        src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3',
        duration: '3:20'
      },
      {
        title: 'Neon Boulevard',
        artist: 'SoundHelix',
        genre: 'Synthwave',
        art: 'https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=300&q=80',
        color: ['#ec4899', '#f59e0b'],
        src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3',
        duration: '4:02'
      },
      {
        title: 'Emerald Coast',
        artist: 'SoundHelix',
        genre: 'Chill',
        art: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=300&q=80',
        color: ['#10b981', '#06b6d4'],
        src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3',
        duration: '3:15'
      },
    ];

    // ── State ────────────────────────────────────────────────
    let currentTrack = 0, isPlaying = false, autoplay = true, shuffle = false, repeat = false;

    // ── DOM refs ─────────────────────────────────────────────
    const audio = document.getElementById('audioEl');
    const albumDisc = document.getElementById('albumDisc');
    const albumImg = document.getElementById('albumImg');
    const albumGlow = document.getElementById('albumGlow');
    const artBg = document.getElementById('artBg');
    const trackTitle = document.getElementById('trackTitle');
    const trackArtist = document.getElementById('trackArtist');
    const trackGenre = document.getElementById('trackGenre');
    const btnPlay = document.getElementById('btnPlay');
    const iconPlay = document.getElementById('iconPlay');
    const iconPause = document.getElementById('iconPause');
    const progressFill = document.getElementById('progressFill');
    const progressTrack = document.getElementById('progressTrack');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');
    const volSlider = document.getElementById('volSlider');
    const volPct = document.getElementById('volPct');
    const plList = document.getElementById('playlistList');
    const plCount = document.getElementById('plCount');
    const visualizer = document.getElementById('visualizer');
    const searchInput = document.getElementById('searchInput');

    // ── Build Waveform Visualizer ─────────────────────────
    const BAR_COUNT = 28;
    for (let i = 0; i < BAR_COUNT; i++) {
      const b = document.createElement('div');
      b.className = 'wave-bar';
      const h = 6 + Math.random() * 26;
      b.style.setProperty('--h', h + 'px');
      b.style.animationDuration = (0.5 + Math.random() * 0.8) + 's';
      b.style.animationDelay = (Math.random() * 0.6) + 's';
      visualizer.appendChild(b);
    }

    // ── Build Playlist ────────────────────────────────────
    function buildPlaylist(filter = '') {
      plList.innerHTML = '';
      const filtered = tracks.filter(t =>
        !filter || t.title.toLowerCase().includes(filter) || t.artist.toLowerCase().includes(filter) || t.genre.toLowerCase().includes(filter)
      );
      plCount.textContent = `${tracks.length} tracks`;
      filtered.forEach((t, fi) => {
        const i = tracks.indexOf(t);
        const li = document.createElement('li');
        li.className = 'pl-item' + (i === currentTrack ? ' active' : '');
        li.innerHTML = `
        <div class="pl-num">${i + 1}</div>
        <div class="pl-bars ${isPlaying ? '' : 'paused'}">
          <div class="pl-bar"></div><div class="pl-bar"></div><div class="pl-bar"></div>
        </div>
        <img class="pl-art" src="${t.art}" alt="${t.title}">
        <div class="pl-info">
          <div class="pl-title">${t.title}</div>
          <div class="pl-artist">${t.artist}</div>
        </div>
        <span class="pl-genre">${t.genre}</span>
        <div class="pl-dur">${t.duration}</div>`;
        li.addEventListener('click', () => loadTrack(i, true));
        plList.appendChild(li);
      });
    }

    // ── Load Track ───────────────────────────────────────
    function loadTrack(index, autoStart = false) {
      currentTrack = index;
      const t = tracks[index];
      audio.src = t.src;
      albumImg.src = t.art;
      trackTitle.textContent = t.title;
      trackArtist.textContent = t.artist;
      trackGenre.textContent = t.genre;
      progressFill.style.width = '0%';
      currentTimeEl.textContent = '0:00';
      totalTimeEl.textContent = t.duration;

      // Dynamic theming
      const [c1, c2] = t.color;
      artBg.style.background = `radial-gradient(ellipse at 30% 30%, ${c1}55 0%, ${c2}22 50%, #0a0a12 80%)`;
      albumGlow.style.background = `radial-gradient(circle, ${c1}44, transparent 70%)`;
      document.documentElement.style.setProperty('--accent', c1);
      document.documentElement.style.setProperty('--accent2', c2);

      // Update gradient on progress
      progressFill.style.background = `linear-gradient(90deg, ${c2}, ${c1})`;
      document.querySelector('.ctrl-play').style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
      document.querySelector('.ctrl-play').style.boxShadow = `0 8px 30px ${c1}66`;

      if (autoStart) { audio.play(); setPlaying(true); }
      else setPlaying(false);
      buildPlaylist(searchInput.value.toLowerCase().trim());
    }

    function setPlaying(state) {
      isPlaying = state;
      iconPlay.style.display = state ? 'none' : '';
      iconPause.style.display = state ? '' : 'none';
      albumDisc.classList.toggle('playing', state);
      visualizer.classList.toggle('paused', !state);
      document.querySelectorAll('.pl-bars').forEach(b =>
        state ? b.classList.remove('paused') : b.classList.add('paused')
      );
    }

    // ── Controls ─────────────────────────────────────────
    btnPlay.addEventListener('click', () => {
      if (!audio.src || audio.src === window.location.href) { loadTrack(0, true); return; }
      if (isPlaying) { audio.pause(); setPlaying(false); }
      else { audio.play(); setPlaying(true); }
    });

    document.getElementById('btnPrev').addEventListener('click', () => {
      if (audio.currentTime > 3) { audio.currentTime = 0; return; }
      loadTrack((currentTrack - 1 + tracks.length) % tracks.length, isPlaying);
    });

    document.getElementById('btnNext').addEventListener('click', nextTrack);

    function nextTrack() {
      let next;
      if (shuffle) {
        do { next = Math.floor(Math.random() * tracks.length); } while (next === currentTrack && tracks.length > 1);
      } else {
        next = (currentTrack + 1) % tracks.length;
      }
      loadTrack(next, isPlaying || autoplay);
    }

    // Shuffle btn (top controls)
    document.getElementById('btnShuffle').addEventListener('click', () => {
      shuffle = !shuffle;
      document.getElementById('btnShuffle').classList.toggle('active', shuffle);
      document.getElementById('shuffleToggle2').classList.toggle('on', shuffle);
    });

    // Repeat btn
    document.getElementById('btnRepeat').addEventListener('click', () => {
      repeat = !repeat;
      document.getElementById('btnRepeat').classList.toggle('active', repeat);
      audio.loop = repeat;
    });

    // ── Progress ─────────────────────────────────────────
    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      const pct = (audio.currentTime / audio.duration) * 100;
      progressFill.style.width = pct + '%';
      currentTimeEl.textContent = fmtTime(audio.currentTime);
    });

    audio.addEventListener('loadedmetadata', () => {
      totalTimeEl.textContent = fmtTime(audio.duration);
    });

    audio.addEventListener('ended', () => {
      if (repeat) return;
      if (autoplay) nextTrack();
      else setPlaying(false);
    });

    progressTrack.addEventListener('click', e => {
      const rect = progressTrack.getBoundingClientRect();
      audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    });

    // ── Volume ───────────────────────────────────────────
    audio.volume = 0.8;
    volSlider.addEventListener('input', () => {
      const v = volSlider.value;
      audio.volume = v / 100;
      volPct.textContent = v + '%';
    });

    // ── Toggles ──────────────────────────────────────────
    document.getElementById('autoplayWrap').addEventListener('click', () => {
      autoplay = !autoplay;
      document.getElementById('autoplayToggle').classList.toggle('on', autoplay);
    });

    document.getElementById('shuffleWrap2').addEventListener('click', () => {
      shuffle = !shuffle;
      document.getElementById('shuffleToggle2').classList.toggle('on', shuffle);
      document.getElementById('btnShuffle').classList.toggle('active', shuffle);
    });

    // ── Search ───────────────────────────────────────────
    searchInput.addEventListener('input', () => {
      buildPlaylist(searchInput.value.toLowerCase().trim());
    });

    // ── Keyboard shortcuts ───────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Space') { e.preventDefault(); btnPlay.click(); }
      if (e.code === 'ArrowRight') document.getElementById('btnNext').click();
      if (e.code === 'ArrowLeft') document.getElementById('btnPrev').click();
      if (e.code === 'ArrowUp') { volSlider.value = Math.min(100, +volSlider.value + 5); volSlider.dispatchEvent(new Event('input')); }
      if (e.code === 'ArrowDown') { volSlider.value = Math.max(0, +volSlider.value - 5); volSlider.dispatchEvent(new Event('input')); }
    });

    // ── Utility ──────────────────────────────────────────
    function fmtTime(s) {
      if (!s || isNaN(s)) return '0:00';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    // ── Init ─────────────────────────────────────────────
    loadTrack(0, false);
  </script>
</body>

</html>
